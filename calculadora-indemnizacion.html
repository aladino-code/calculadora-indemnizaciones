  function calcular(){
    var L = T[lang];
    var tipo = $('tipo').value;
    var sa = parseFloat($('sal').value);
    var fiS = $('fi').value, ffS = $('ff').value;
    if (!tipo) return alert(L.alert_tipo);
    if (isNaN(sa) || sa<=0) return alert(L.alert_salario);
    if (!fiS || !ffS) return alert(L.alert_fechas);
    var sd = sa/365, ini = new Date(fiS), fin = new Date(ffS);
    if (fin<=ini) return alert(L.alert_orden);

    var r = REGLAS[tipo], total, det, dL, aL, tL;

    if (tipo==='disciplinario'){
      total=0; dL='0'; aL=dy(ini,fin).toFixed(2); tL='--'; det=L.det_disciplinario;
    } else if (r.calc==='doble'){
      var sm=sd*30, t1=0, t2=0, a1=0, a2=0;
      if (ini<FR){ var f1 = fin<FR?fin:FR; a1=dy(ini,f1); t1=sd*45*a1; if (t1>sm*42) t1=sm*42; }
      if (fin>FR){ var i2 = ini>FR?ini:FR; a2=dy(i2,fin); t2=sd*33*a2; if (t2>sm*24) t2=sm*24; }
      var tot=t1+t2, tp7=sd*720; if (tot>tp7 && t1<tp7) tot=tp7;
      total=Math.max(tot,0); aL=(a1+a2).toFixed(2); tL='24 '+L.meses; dL='33/45';
      var dd = L.det_desglose;
      if (a1>0) dd += L.det_pre + a1.toFixed(2) + L.det_anios + fmt(t1) + '. ';
      if (a2>0) dd += L.det_post + a2.toFixed(2) + L.det_anios + fmt(t2) + '.';
      if (a1===0 && a2>0){ dL='33'; tL='24 '+L.meses; }
      if (a1>0 && a2===0){ dL='45'; tL='42 '+L.meses; }
      det = dd;
    } else if (r.calc==='altoD'){
      var a=dy(ini,fin), sm=sd*30, ind=sd*7*a, mn=sm*6;
      if (ind<mn) ind=mn;
      var p=parseFloat($('pac').value); if (!isNaN(p) && p>ind) ind=p;
      total=ind; dL='7'; aL=a.toFixed(2); tL=L.min_6;
      det = L.det_alto_desist + fmt(mn) + ').';
      if (!isNaN(p) && p>0) det += L.det_pacto + fmt(p) + '.';
    } else if (r.calc==='altoI'){
      var a=dy(ini,fin), sm=sd*30, ind=sd*20*a, tp=sm*12;
      if (ind>tp) ind=tp;
      var p=parseFloat($('pac').value); if (!isNaN(p) && p>ind) ind=p;
      total=ind; dL='20'; aL=a.toFixed(2); tL='12 '+L.meses;
      det = L.det_alto_desp + fmt(tp) + ').';
      if (!isNaN(p) && p>0) det += L.det_pacto + fmt(p) + '.';
    } else {
      var a=dy(ini,fin), sm=sd*30, ind=sd*r.dias*a, tp=r.tope>0?sm*r.tope:Infinity;
      if (ind>tp) ind=tp;
      total=Math.max(ind,0); dL=String(r.dias); aL=a.toFixed(2);
      tL = r.tope>0 ? (r.tope+' '+L.meses) : L.sin_tope;
      det = '<strong>' + r.dias + L.det_dias + a.toFixed(2) + L.det_x_anios + fmt(sd) + L.det_dia + fmt(total);
      if (r.tope>0) det += L.det_tope + fmt(tp) + ')';
    }

    $('rT').textContent = fmt(total);
    $('rD').textContent = dL;
    $('rA').textContent = aL;
    $('rTp').textContent = tL;
    $('rDet').innerHTML = det;
    $('res').classList.add('on');
  }

  $('lES').addEventListener('click', function(){ lang='es'; apply(); });
  $('lEN').addEventListener('click', function(){ lang='en'; apply(); });
  $('tipo').addEventListener('change', onTipo);
  $('btnCalc').addEventListener('click', calcular);
  $('btnPr').addEventListener('click', function(){ window.print(); });

  try { $('ff').valueAsDate = new Date(); } catch(e){}
  apply();
} catch(e) { if (window.console && console.warn) console.warn('[calcIndem]', e); } }
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', ciInit);
} else {
  ciInit();
}
})();
</script>
